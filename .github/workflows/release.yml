name: Release
on:
  push:
    tags: ['v*.*.*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v4

      # Validate required secrets are present
      - name: Validate Chrome Web Store secrets
        run: |
          MISSING=""
          [[ -z "${{ secrets.CWS_EXTENSION_ID }}" ]] && MISSING="${MISSING}CWS_EXTENSION_ID "
          [[ -z "${{ secrets.CWS_CLIENT_ID }}" ]] && MISSING="${MISSING}CWS_CLIENT_ID "
          [[ -z "${{ secrets.CWS_CLIENT_SECRET }}" ]] && MISSING="${MISSING}CWS_CLIENT_SECRET "
          [[ -z "${{ secrets.CWS_REFRESH_TOKEN }}" ]] && MISSING="${MISSING}CWS_REFRESH_TOKEN "

          if [[ -n "$MISSING" ]]; then
            echo "❌ ERROR: Missing required GitHub Secrets: $MISSING"
            echo ""
            echo "To set up fully automated Chrome Web Store publishing:"
            echo "1. Go to: https://github.com/${{ github.repository }}/settings/secrets/actions"
            echo "2. Click 'New repository secret' and add each of the following:"
            echo "   - CWS_EXTENSION_ID (your Chrome extension ID)"
            echo "   - CWS_CLIENT_ID (OAuth client ID)"
            echo "   - CWS_CLIENT_SECRET (OAuth client secret)"
            echo "   - CWS_REFRESH_TOKEN (OAuth refresh token)"
            echo ""
            echo "📖 See .github/CHROME_WEB_STORE_SETUP.md for detailed instructions"
            exit 1
          fi
          echo "✅ All Chrome Web Store secrets present"

      - name: Sync manifest version to tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "const fs=require('fs');const p='extension/manifest.json';const m=JSON.parse(fs.readFileSync(p));m.version='${VERSION}';fs.writeFileSync(p,JSON.stringify(m,null,2)+'\n');"
          cat extension/manifest.json | grep version

      - name: Build zip
        run: |
          cd extension && zip -rq "../echokit-${GITHUB_REF_NAME}.zip" . -x '*.DS_Store'
          ls -la "../echokit-${GITHUB_REF_NAME}.zip"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: echokit-${{ github.ref_name }}.zip
          generate_release_notes: true

      # Fully automated Chrome Web Store publishing
      - name: Publish to Chrome Web Store
        env:
          CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
          CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
        run: |
          set -e
          echo "🔑 Fetching OAuth access token..."
          TOKEN=$(curl -s "https://oauth2.googleapis.com/token" \
            -d "client_id=${CWS_CLIENT_ID}&client_secret=${CWS_CLIENT_SECRET}&refresh_token=${CWS_REFRESH_TOKEN}&grant_type=refresh_token" \
            | python3 -c "import sys,json;print(json.load(sys.stdin)['access_token'])")

          echo "📤 Uploading extension to Chrome Web Store..."
          UPLOAD_RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "x-goog-api-version: 2" \
            -X PUT -T "echokit-${GITHUB_REF_NAME}.zip" \
            "https://www.googleapis.com/upload/chromewebstore/v1.1/items/${CWS_EXTENSION_ID}")

          HTTP_CODE=$(echo "$UPLOAD_RESPONSE" | tail -n1)
          RESPONSE_BODY=$(echo "$UPLOAD_RESPONSE" | sed '$d')

          if [[ "$HTTP_CODE" != "200" ]]; then
            echo "❌ Upload failed with HTTP $HTTP_CODE"
            echo "$RESPONSE_BODY"
            exit 1
          fi
          echo "✅ Upload successful"

          echo "🚀 Publishing extension..."
          PUBLISH_RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "x-goog-api-version: 2" \
            -H "Content-Length: 0" \
            -X POST "https://www.googleapis.com/chromewebstore/v1.1/items/${CWS_EXTENSION_ID}/publish")

          HTTP_CODE=$(echo "$PUBLISH_RESPONSE" | tail -n1)
          RESPONSE_BODY=$(echo "$PUBLISH_RESPONSE" | sed '$d')

          if [[ "$HTTP_CODE" != "200" ]]; then
            echo "❌ Publish failed with HTTP $HTTP_CODE"
            echo "$RESPONSE_BODY"
            exit 1
          fi

          echo "✅ Extension published successfully!"
          echo "🎉 EchoKit ${GITHUB_REF_NAME} is now live on Chrome Web Store"
          echo "📋 Note: Chrome review typically takes 1-2 days before going fully live"
